<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Carona | HitchParty</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/ride-detail.css">
</head>
<body>
    <div id="header-slot"></div>
    <main class="ride-detail-page">
        <section class="driver-card">

            <div class="driver-avatar">
                GS
            </div>

            <div class="driver-info">

                <h2 id="driverName">
                    Motorista
                </h2>

                <p id="driverRating">
                    ⭐ 0.0 • 0 viagens
                </p>

            </div>
        </section>
        <section class="route-card">
            <h3>Rota</h3>
            <div class="route-timeline">

                <div class="route-point start">
                    Origem
                </div>

                <div class="route-line"></div>

                <div class="route-point end">
                    Destino
                </div>

            </div>
        </section>
        <section class="details-card">
            <h3>Detalhes da Viagem</h3>
            <div class="detail-item">
                <span>📅 Data</span>
                <strong id="rideDate"></strong>
            </div>
            <div class="detail-item">
                <span>🕒 Horário</span>
                <strong id="rideTime"></strong>
            </div>
            <div class="detail-item">
                <span>🚗 Veículo</span>
                <strong id="vehicle"></strong>
            </div>
            <div class="detail-item">
                <span>💺 Vagas</span>
                <strong id="availableSeats"></strong>
            </div>
            <div class="detail-item">
                <span>💰 Valor</span>
                <strong id="price"></strong>
            </div>
        </section>
        <section class="notes-card">
            <h3>Observações</h3>
            <p id="rideNotes">
                Nenhuma observação cadastrada.
            </p>
        </section>
        <section class="action-buttons">
            <button
                id="requestSeatBtn"
                class="btn btn-primary w-100">
                Solicitar Vaga
            </button>
            <button
                id="messageDriverBtn"
                class="btn btn-outline-primary w-100">
                Enviar Mensagem
            </button>
        </section>
    </main>
    <div id="navbar-slot"></div>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/ride-detail.js"></script>
</body>
</html>
