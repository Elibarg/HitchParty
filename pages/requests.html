<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">
    <title>
        Solicitações | HitchParty
    </title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link
        rel="stylesheet"
        href="../assets/css/variables.css">
    <link
        rel="stylesheet"
        href="../assets/css/global.css">
    <link
        rel="stylesheet"
        href="../assets/css/requests.css">
</head>
<body>
    <div id="header-slot"></div>
    <main class="requests-page">
        <section class="page-header">
            <h1>
                Solicitações
            </h1>
            <p>
                Gerencie solicitações recebidas e enviadas.
            </p>
        </section>
        <!-- ABAS -->
        <div class="requests-tabs">
            <button
                class="tab-button active"
                data-tab="received">
                Recebidas
            </button>
            <button
                class="tab-button"
                data-tab="sent">
                Enviadas
            </button>
        </div>
        <!-- RECEBIDAS -->
        <section
            id="receivedRequests"
            class="requests-container">
        </section>
        <!-- ENVIADAS -->
        <section
            id="sentRequests"
            class="requests-container d-none">
        </section>
    </main>
    <div id="navbar-slot"></div>
    <!-- TOAST -->
    <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3">
        <div
            id="feedbackToast"
            class="toast text-bg-success border-0">
            <div class="d-flex">
                <div
                    id="toastMessage"
                    class="toast-body">
                    Solicitação atualizada.
                </div>
                <button
                    type="button"
                    class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast">
                </button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/requests.js"></script>
</body>
</html>
