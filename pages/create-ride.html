<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Criar Carona | HitchParty</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/create-ride.css">

</head>

<body>

    <div id="header-slot"></div>

    <main class="create-ride-page">

        <section class="form-card">

            <div class="page-title">

                <h1>Criar Carona</h1>

                <p>Publique uma nova viagem para passageiros.</p>

            </div>

            <form id="createRideForm">

                <h2 class="section-title">
                    Rota
                </h2>

                <div class="mb-3">

                    <label
                        for="origin"
                        class="form-label">

                        Origem
                    </label>

                    <input
                        type="text"
                        id="origin"
                        class="form-control"
                        placeholder="Ex: Rua das Palmeiras"
                        required>

                </div>

                <div class="mb-3">

                    <label
                        for="destination"
                        class="form-label">

                        Destino
                    </label>

                    <input
                        type="text"
                        id="destination"
                        class="form-control"
                        placeholder="Ex: Rua Tuiuti"
                        required>

                </div>

                <div class="row">

                    <div class="col-6 mb-3">

                        <label
                            for="rideTime"
                            class="form-label">

                            Horário
                        </label>

                        <input
                            type="time"
                            id="rideTime"
                            class="form-control"
                            required>

                    </div>

                </div>

                <h2 class="section-title">
                    Viagem
                </h2>

                <div class="mb-3">

                    <label
                        for="vehicle"
                        class="form-label">

                        Veículo
                    </label>

                    <select
                        id="vehicle"
                        class="form-select"
                        required>

                        <option value="">
                            Selecione um veículo
                        </option>

                    </select>

                </div>

                <div class="row">

                    <div class="col-6 mb-3">

                        <label
                            for="availableSeats"
                            class="form-label">

                            Vagas
                        </label>

                        <input
                            type="number"
                            id="availableSeats"
                            min="1"
                            max="8"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-6 mb-3">

                        <label
                            for="price"
                            class="form-label">

                            Valor (R$)
                        </label>

                        <input
                            type="number"
                            id="price"
                            min="0"
                            step="0.01"
                            class="form-control"
                            required>

                    </div>

                </div>

                <div class="mb-4">

                    <label
                        for="notes"
                        class="form-label">

                        Observações
                    </label>

                    <textarea
                        id="notes"
                        rows="4"
                        class="form-control"
                        placeholder="Bagagens, animais, ponto de encontro..."></textarea>

                </div>

                <button
                    type="submit"
                    id="publishRideBtn"
                    class="btn btn-primary w-100 publish-btn">

                    Publicar Carona

                </button>

            </form>

        </section>

    </main>

    <div id="navbar-slot"></div>

    <!-- Toast -->

    <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3">

        <div
            id="feedbackToast"
            class="toast text-bg-success border-0">

            <div class="d-flex">

                <div
                    id="toastMessage"
                    class="toast-body">

                    Carona criada.

                </div>

                <button
                    type="button"
                    class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast">
                </button>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/create-ride.js"></script>

</body>

</html>
