<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Scanner QR | HitchParty
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="../assets/css/variables.css">

    <link
        rel="stylesheet"
        href="../assets/css/global.css">

    <link
        rel="stylesheet"
        href="../assets/css/scan-qr.css">

</head>

<body>

    <div id="header-slot"></div>

    <main class="scan-page">
        <button class="back-button" type="button" onclick="goBack()">← Voltar</button>


        <section class="scanner-card">

            <div class="scanner-header">

                <h1>
                    Scanner QR
                </h1>

                <p>
                    Escaneie o QR Code da viagem.
                </p>

            </div>

            <div class="scanner-preview">

                <div class="scanner-frame">

                    <div class="scanner-icon">

                        <i class="bi bi-qr-code-scan"></i>

                    </div>

                </div>

            </div>

            <div class="scanner-info">

                Posicione o QR Code dentro da área de leitura.

            </div>

            <div class="scanner-actions">

                <button
                    id="scanQrBtn"
                    class="btn btn-success w-100">

                    Validar QR

                </button>

            </div>

        </section>

    </main>

    <div id="navbar-slot"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../assets/js/app.js"></script>

    <script src="../assets/js/scan-qr.js"></script>

</body>

</html>
