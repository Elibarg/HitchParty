<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Meus Veículos | HitchParty</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/vehicles.css">

</head>

<body>

    <div id="header-slot"></div>

    <main class="vehicles-page">
        <button class="back-button" type="button" onclick="goBack()">← Voltar</button>


        <section class="page-header">

            <h1>Meus Veículos</h1>

            <p>Gerencie os veículos utilizados nas suas caronas.</p>

        </section>

        <section id="vehiclesList" class="vehicles-list">
            <!-- Cards renderizados pelo JS -->
        </section>

        <button
            class="btn btn-primary add-vehicle-btn"
            data-bs-toggle="modal"
            data-bs-target="#vehicleModal">

            + Adicionar Veículo

        </button>

    </main>

    <div id="navbar-slot"></div>

    <!-- Modal de Veículo -->
    <div class="modal fade" id="vehicleModal" tabindex="-1" aria-hidden="true">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title" id="vehicleModalLabel">
                        Veículo
                    </h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Fechar">
                    </button>

                </div>

                <div class="modal-body">

                    <form id="vehicleForm" novalidate>

                        <input type="hidden" id="vehicleId">

                        <div class="vehicle-image-section mb-3">

                            <div class="vehicle-image-preview" id="vehicleImagePreviewWrapper">

                                <img
                                    id="vehiclePreview"
                                    src="../assets/img/car-placeholder.png"
                                    alt="Pré-visualização da imagem do veículo">

                            </div>

                            <label class="btn btn-outline-primary w-100 mt-3" for="vehicleImage">
                                Selecionar imagem do veículo
                            </label>
                            <button
                                type="button"
                                id="removeVehicleImageBtn"
                                class="btn btn-outline-danger w-100 mt-2">

                                Remover imagem

                            </button>
                            <input
                                type="file"
                                id="vehicleImage"
                                class="d-none"
                                accept="image/png,image/jpeg,image/webp">

                            <div class="form-text text-center mt-2">
                                Formatos aceitos: PNG, JPG e WEBP.
                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label" for="brand">Marca</label>

                            <input
                                type="text"
                                id="brand"
                                class="form-control"
                                placeholder="Ex: Honda"
                                maxlength="30"
                                autocomplete="off"
                                required>

                            <div class="invalid-feedback">
                                Informe a marca.
                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label" for="model">Modelo</label>

                            <input
                                type="text"
                                id="model"
                                class="form-control"
                                placeholder="Ex: Civic"
                                maxlength="30"
                                autocomplete="off"
                                required>

                            <div class="invalid-feedback">
                                Informe o modelo.
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-6">

                                <div class="mb-3">

                                    <label class="form-label" for="year">Ano</label>

                                    <input
                                        type="number"
                                        id="year"
                                        class="form-control"
                                        min="1980"
                                        max="2026"
                                        step="1"
                                        inputmode="numeric"
                                        required>

                                    <div class="invalid-feedback">
                                        Informe um ano válido.
                                    </div>

                                </div>

                            </div>

                            <div class="col-6">

                                <div class="mb-3">

                                    <label class="form-label" for="color">Cor</label>

                                    <input
                                        type="text"
                                        id="color"
                                        class="form-control"
                                        placeholder="Ex: Preto"
                                        maxlength="20"
                                        autocomplete="off"
                                        required>

                                    <div class="invalid-feedback">
                                        Informe a cor.
                                    </div>

                                </div>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label" for="plate">Placa</label>

                            <input
                                type="text"
                                id="plate"
                                class="form-control"
                                placeholder="Ex: ABC1D23"
                                maxlength="7"
                                minlength="7"
                                autocomplete="off"
                                required>

                            <div class="form-text">
                                Use 7 caracteres sem espaço.
                            </div>

                            <div class="invalid-feedback">
                                Informe uma placa válida.
                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label" for="seats">Número de Assentos</label>

                            <input
                                type="number"
                                id="seats"
                                class="form-control"
                                min="1"
                                max="8"
                                step="1"
                                inputmode="numeric"
                                value="5"
                                required>

                            <div class="invalid-feedback">
                                Informe a quantidade de assentos.
                            </div>

                        </div>

                    </form>

                </div>

                <div class="modal-footer">

                    <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">

                        Cancelar

                    </button>

                    <button
                        type="button"
                        id="saveVehicleBtn"
                        class="btn btn-primary">

                        Salvar

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3">

        <div
            id="feedbackToast"
            class="toast text-bg-success border-0">

            <div class="d-flex">

                <div id="toastMessage" class="toast-body">
                    Veículo salvo.
                </div>

                <button
                    type="button"
                    class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"
                    aria-label="Fechar">
                </button>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/vehicles.js"></script>

</body>
</html>
